<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
    <h2>Churn Prediction WebApp</h2>
    <p>Загрузите CSV с клиентами, чтобы получить предсказания.</p>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit" class="btn btn-primary">Предсказать</button>
    </form>

    {% if result %}
        <h3 class="mt-4">Результаты (первые 5 строк)</h3>
        {{ result | safe }}
        {% if download_link %}
            <a href="{{ download_link }}" class="btn btn-success mt-2">Скачать CSV с результатами</a>
        {% endif %}
    {% endif %}
</body>
</html>
